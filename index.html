<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EngineerHub - Your Complete Engineering Roadmap</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              darkBg: '#0f172a',
              darkCard: '#1e293b',
              primaryCyan: '#06b6d4',
              accentCyan: '#22d3ee',
            }
          }
        }
      }
    </script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
      body {
        background-color: #0f172a;
        color: #e2e8f0;
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      }
      .glass-panel {
        background-color: rgba(30, 41, 59, 0.8);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(51, 65, 85, 0.5);
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
      }
      .hover-glass {
        transition: all 0.3s ease;
      }
      .hover-glass:hover {
        background-color: rgba(30, 41, 59, 0.95);
        border-color: rgba(6, 182, 212, 0.5);
        box-shadow: 0 0 15px rgba(6, 182, 212, 0.15);
        transform: translateY(-4px);
      }
      .animate-float {
        animation: float 6s ease-in-out infinite;
      }
      @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-20px); }
        100% { transform: translateY(0px); }
      }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useEffect } = React;

      // Mock Lucide Icons
      const IconCode = () => <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-primaryCyan mb-4"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>;
      const IconCpu = () => <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-primaryCyan mb-4"><rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect><rect x="9" y="9" width="6" height="6"></rect><line x1="9" y1="1" x2="9" y2="4"></line><line x1="15" y1="1" x2="15" y2="4"></line><line x1="9" y1="20" x2="9" y2="23"></line><line x1="15" y1="20" x2="15" y2="23"></line><line x1="20" y1="9" x2="23" y2="9"></line><line x1="20" y1="14" x2="23" y2="14"></line><line x1="1" y1="9" x2="4" y2="9"></line><line x1="1" y1="14" x2="4" y2="14"></line></svg>;
      const IconZap = () => <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-primaryCyan mb-4"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>;
      const IconBook = () => <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-primaryCyan"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>;

      const IconUser = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>;
      const IconActivity = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>;
      const IconSettings = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>;

      const branches = [
        { id: 'cse', name: 'Computer Science', icon: <IconCode />, desc: 'Software, AI, Web Dev & more' },
        { id: 'eee', name: 'Electrical & Electronics', icon: <IconZap />, desc: 'Power Systems, Core Electronics' },
        { id: 'mech', name: 'Mechanical', icon: <IconCpu />, desc: 'Machines, Robotics, Auto' },
      ];

      const App = () => {
        const [view, setView] = useState('home');
        const [activeBranch, setActiveBranch] = useState(null);
        const [dashboardTab, setDashboardTab] = useState('overview');
        const [isLoggedIn, setIsLoggedIn] = useState(false);

        const openBranch = (id) => {
          if (!isLoggedIn) {
            alert('Please login to view roadmaps!');
            setView('login');
            return;
          }
          setActiveBranch(id);
          setView('roadmap');
        };

        return (
          <div className="min-h-screen flex flex-col">
            {/* Navbar */}
            <nav className="fixed w-full z-50 glass-panel border-b border-slate-700/50">
              <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div className="flex items-center justify-between h-16">
                  <div className="flex items-center gap-2 cursor-pointer" onClick={() => setView('home')}>
                    <IconBook />
                    <span className="text-xl font-bold text-white tracking-tight">
                      Engineer<span className="text-primaryCyan">Hub</span>
                    </span>
                  </div>
                  <div className="hidden md:flex space-x-8">
                    <button onClick={() => setView('home')} className="text-slate-300 hover:text-primaryCyan">Home</button>
                    <button className="text-slate-300 hover:text-primaryCyan">Community</button>
                  </div>
                  <button onClick={() => setView('login')} className="bg-primaryCyan text-darkBg px-4 py-2 rounded-md font-bold hover:bg-accentCyan shadow-[0_0_15px_rgba(6,182,212,0.3)]">
                    Login
                  </button>
                </div>
              </div>
            </nav>

            {/* Main Content */}
            <main className="flex-grow pt-16 mt-8">
              {view === 'home' && (
                <div className="flex flex-col items-center">
                  <section className="w-full relative overflow-hidden py-16 px-4 text-center">
                    <div className="absolute top-1/4 left-1/2 -translate-x-1/2 w-[500px] h-[500px] bg-primaryCyan/20 blur-[100px] rounded-full pointer-events-none"></div>
                    <h1 className="text-5xl md:text-7xl font-extrabold tracking-tight text-white mb-6 z-10 relative">
                      Your Complete <br />
                      <span className="text-transparent bg-clip-text bg-gradient-to-r from-primaryCyan to-blue-500">
                        Engineering Roadmap
                      </span>
                    </h1>
                    <p className="mt-4 text-xl text-slate-400 max-w-2xl mx-auto z-10 relative">
                      Navigate your 4-year journey with confidence. Explore branches and follow curated roadmaps.
                    </p>
                  </section>

                  <section className="w-full max-w-7xl px-4 py-12 mx-auto">
                    <h2 className="text-3xl font-bold text-center mb-10">Choose Your <span className="text-primaryCyan">Path</span></h2>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                      {branches.map(branch => (
                        <div key={branch.id} onClick={() => openBranch(branch.id)} className="glass-panel p-8 rounded-2xl hover-glass h-full flex flex-col items-start cursor-pointer">
                          {branch.icon}
                          <h3 className="text-xl font-bold text-white mb-2">{branch.name}</h3>
                          <p className="text-slate-400 mb-6">{branch.desc}</p>
                          <div className="text-primaryCyan font-medium mt-auto">View Roadmap &rarr;</div>
                        </div>
                      ))}
                    </div>
                  </section>
                </div>
              )}

              {view === 'roadmap' && (
                <div className="max-w-5xl mx-auto px-4 py-8">
                  <button onClick={() => setView('home')} className="text-slate-400 hover:text-white mb-8 flex items-center gap-2">
                    &larr; Back to branches
                  </button>
                  <h1 className="text-4xl font-bold mb-8">4-Year Roadmap: <span className="text-primaryCyan uppercase">{activeBranch}</span></h1>
                  
                  <div className="space-y-6">
                    {[1, 2, 3, 4].map(year => (
                      <div key={year} className="glass-panel p-6 rounded-2xl border-l-4 border-l-primaryCyan">
                         <h3 className="text-2xl font-bold text-white mb-4">Year {year}</h3>
                         <div className="bg-slate-800/50 p-4 rounded-lg mb-4">
                            <h4 className="text-lg font-semibold text-primaryCyan mb-2">Semester {year * 2 - 1} & {year * 2} Core Subjects</h4>
                            <ul className="list-disc list-inside text-slate-300 space-y-2">
                              <li>Data Structures & Algorithms</li>
                              <li>Database Management Systems</li>
                              <li>Operating Systems</li>
                            </ul>
                         </div>
                         <button className="text-sm bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded text-white transition-colors">
                           Mark Year {year} Complete
                         </button>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {view === 'login' && (
                <div className="flex items-center justify-center min-h-[80vh] px-4 w-full">
                  <div className="glass-panel p-8 md:p-10 rounded-3xl relative z-10 w-full max-w-md shadow-2xl">
                    <div className="text-center mb-8">
                      <h1 className="text-3xl font-extrabold text-white mb-2">Welcome Back!</h1>
                      <p className="text-slate-400">Log in to continue your journey.</p>
                    </div>
                    <form onSubmit={(e) => { e.preventDefault(); setIsLoggedIn(true); setView('dashboard'); }} className="space-y-6">
                      <div className="space-y-2">
                        <label className="text-sm font-medium text-slate-300 ml-1">Email</label>
                        <input type="email" required className="w-full bg-slate-800/50 border border-slate-600 text-white rounded-xl py-3 px-4 focus:outline-none focus:border-primaryCyan" placeholder="engineer@example.com" />
                      </div>
                      <div className="space-y-2">
                        <label className="text-sm font-medium text-slate-300 ml-1">Password</label>
                        <input type="password" required className="w-full bg-slate-800/50 border border-slate-600 text-white rounded-xl py-3 px-4 focus:outline-none focus:border-primaryCyan" placeholder="••••••••" />
                      </div>
                      <button type="submit" className="w-full bg-primaryCyan text-darkBg font-bold py-3.5 rounded-xl hover:bg-accentCyan mt-2">
                        Sign In
                      </button>
                    </form>
                  </div>
                </div>
              )}

              {view === 'dashboard' && (
                <div className="max-w-7xl mx-auto px-4 py-8 flex flex-col md:flex-row gap-8 w-full">
                  <div className="w-full md:w-64 flex-shrink-0">
                    <div className="glass-panel p-6 rounded-2xl sticky top-24">
                      <div className="flex items-center gap-4 mb-8">
                        <div className="w-12 h-12 rounded-full bg-gradient-to-tr from-primaryCyan to-blue-500 flex items-center justify-center text-white"><IconUser /></div>
                        <div>
                          <h3 className="font-bold text-white">Alex Engineer</h3>
                          <span className="text-xs text-primaryCyan">CSE • Year 2</span>
                        </div>
                      </div>
                      <nav className="space-y-2">
                        <button onClick={() => setDashboardTab('overview')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl ${dashboardTab === 'overview' ? 'bg-primaryCyan/10 text-primaryCyan' : 'text-slate-400 hover:text-slate-200'}`}><IconActivity /> Overview</button>
                        <button onClick={() => setDashboardTab('settings')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl ${dashboardTab === 'settings' ? 'bg-primaryCyan/10 text-primaryCyan' : 'text-slate-400 hover:text-slate-200'}`}><IconSettings /> Settings</button>
                        <button onClick={() => {setIsLoggedIn(false); setView('home'); setDashboardTab('overview');}} className="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:text-red-400 mt-8">Logout</button>
                      </nav>
                    </div>
                  </div>
                  <div className="flex-grow">
                    {dashboardTab === 'overview' && (
                      <div className="glass-panel p-8 rounded-2xl">
                        <h2 className="text-3xl font-bold text-white mb-2">Welcome back! 👋</h2>
                        <p className="text-slate-400 mb-8">You're currently in Year 2 of Computer Science. You have 3 pending topics.</p>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
                          <div className="bg-slate-800 p-4 rounded-xl"><p className="text-sm text-slate-400">Topics</p><p className="text-2xl font-bold text-white">42</p></div>
                          <div className="bg-slate-800 border border-primaryCyan/40 p-4 rounded-xl"><p className="text-sm text-slate-400">Streak</p><p className="text-2xl font-bold text-primaryCyan">8 Days</p></div>
                          <div className="bg-slate-800 p-4 rounded-xl"><p className="text-sm text-slate-400">Rank</p><p className="text-2xl font-bold text-white">#1,204</p></div>
                        </div>
                        <h3 className="text-xl text-white font-bold mb-4">Current Progress</h3>
                        <div className="h-4 bg-slate-800 rounded-full overflow-hidden w-full mb-2"><div className="h-full bg-primaryCyan w-[45%]"></div></div>
                        <p className="text-right text-primaryCyan font-bold text-sm">45%</p>
                      </div>
                    )}
                    {dashboardTab === 'settings' && (
                      <div className="glass-panel p-8 rounded-2xl flex flex-col">
                        <h2 className="text-2xl font-bold text-white mb-6 border-b border-slate-700 pb-4">Account Settings</h2>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                          <div><label className="text-sm text-slate-400">Full Name</label><input type="text" defaultValue="Alex Engineer" className="w-full bg-slate-800 mt-2 p-3 rounded-lg text-white" /></div>
                          <div><label className="text-sm text-slate-400">Email</label><input type="email" defaultValue="engineer@example.com" className="w-full bg-slate-800 mt-2 p-3 rounded-lg text-white" /></div>
                        </div>
                        <button className="bg-primaryCyan text-darkBg font-bold px-6 py-2 rounded-lg self-start">Save Changes</button>
                        <h3 className="text-xl text-white font-bold mt-10 mb-4 text-red-400">Danger Zone</h3>
                        <div className="bg-red-500/10 border border-red-500/20 p-4 rounded-xl flex justify-between items-center">
                          <div><p className="text-red-400 font-bold">Delete Account</p><p className="text-sm text-slate-400">This action cannot be undone.</p></div>
                          <button className="bg-red-500 text-white font-bold px-4 py-2 rounded-lg">Delete</button>
                        </div>
                      </div>
                    )}
                  </div>
                </div>
              )}
            </main>
          </div>
        );
      };

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
</body>
</html>
